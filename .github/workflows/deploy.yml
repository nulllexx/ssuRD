name: Deploy to Minecraft Server

on:
  # Push to main ships to prod: build -> backup -> scp -> restart container.
  push:
    branches: [main]
  # Manual dispatch stays for deploying any other branch/tag/SHA (requires the confirm gate).
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch (or tag/SHA) to deploy'
        required: true
        default: 'main'
      confirm:
        description: 'Type "deploy" to confirm a production deploy'
        required: true
        default: ''

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # The confirm gate only applies to manual dispatch; a push to main is itself the intent.
    - name: Validate confirmation
      if: github.event_name == 'workflow_dispatch'
      run: |
        if [ "${{ inputs.confirm }}" != "deploy" ]; then
          echo "::error::You must type 'deploy' in the confirm field to proceed."
          exit 1
        fi

    # Fail fast if AES_KEY isn't a usable AES length. Raw-bytes AES needs exactly 16/24/32 bytes;
    # this is the exact footgun behind the "Invalid AES key length: 64 bytes" outage.
    - name: Validate AES_KEY length
      env:
        AES_KEY: ${{ secrets.AES_KEY }}
      run: |
        len=$(printf '%s' "$AES_KEY" | wc -c)
        if [ "$len" -ne 16 ] && [ "$len" -ne 24 ] && [ "$len" -ne 32 ]; then
          echo "::error::AES_KEY secret must be 16, 24, or 32 bytes (AES-128/192/256); got $len. Fix the repo secret before deploying."
          exit 1
        fi
        echo "AES_KEY length OK ($len bytes)."

    - uses: actions/checkout@v4
      with:
        # Manual: the chosen branch. Push: the pushed ref (inputs.branch is empty).
        ref: ${{ inputs.branch || github.ref }}

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B clean package --file pom.xml

    - name: Resolve built JAR path
      id: jar
      run: |
        JAR_PATH=$(ls target/ServerUtils-*.jar | grep -v original- | head -n1)
        if [ -z "$JAR_PATH" ]; then
          echo "::error::No built JAR found in target/"
          exit 1
        fi
        echo "path=$JAR_PATH" >> "$GITHUB_OUTPUT"
        echo "name=$(basename $JAR_PATH)" >> "$GITHUB_OUTPUT"

    - name: Back up existing plugin JAR on server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: 2222
        script: |
          set -e
          PLUGINS=/home/useradmin/mcserver/plugins
          BACKUPS=/home/useradmin/mcserver/plugins/_backups
          mkdir -p "$BACKUPS"
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          for f in "$PLUGINS"/ServerUtils-*.jar; do
            [ -e "$f" ] || continue
            cp -v "$f" "$BACKUPS/$(basename "$f").$TS.bak"
          done
          ls -t "$BACKUPS" | tail -n +11 | xargs -I {} rm -f -- "$BACKUPS/{}" || true

    - name: Copy JAR to remote server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: 2222
        source: ${{ steps.jar.outputs.path }}
        target: /home/useradmin/mcserver/plugins/
        strip_components: 1

    # Write the (validated) secret into the server's real .env so the plugin actually picks it up.
    # Only the AES_KEY line is touched; ADMIN_USER/ADMIN_PWD and any other entries are preserved.
    - name: Sync AES_KEY into the server .env
      uses: appleboy/ssh-action@master
      env:
        AES_KEY: ${{ secrets.AES_KEY }}
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: 2222
        envs: AES_KEY
        script: |
          set -e
          ENV_FILE=/home/useradmin/mcserver/.env
          if [ -z "$AES_KEY" ]; then
            echo "::error::AES_KEY is empty; refusing to touch $ENV_FILE"
            exit 1
          fi
          touch "$ENV_FILE"
          tmp=$(mktemp)
          grep -v '^AES_KEY=' "$ENV_FILE" > "$tmp" || true
          printf 'AES_KEY=%s\n' "$AES_KEY" >> "$tmp"
          cat "$tmp" > "$ENV_FILE"   # write in place: keeps the file's owner/permissions
          rm -f "$tmp"
          echo "AES_KEY synced into $ENV_FILE."

    - name: Restart Minecraft container
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: 2222
        script: |
          cd /home/useradmin/docker
          docker compose restart minecraft

    - name: Summary
      run: |
        echo "Deployed ${{ steps.jar.outputs.name }} from ref '${{ inputs.branch || github.ref_name }}'." >> "$GITHUB_STEP_SUMMARY"
        echo "AES_KEY (from the repo secret) synced into /home/useradmin/mcserver/.env and the container restarted." >> "$GITHUB_STEP_SUMMARY"
        echo "Previous JAR backed up under /home/useradmin/mcserver/plugins/_backups/ on the server." >> "$GITHUB_STEP_SUMMARY"
