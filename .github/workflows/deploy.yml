name: Java CI with Maven & Deploy

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'master'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Create .env file
      run: |
        echo "AES_KEY=${{ secrets.AES_KEY }}" > .env

    - name: Build with Maven
      run: mvn -B clean package --file pom.xml

    - name: Copy JAR to Remote Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: 2222
        source: "target/ServerUtils-11.1.jar"
        target: "/home/useradmin/mcserver/plugins/"
        strip_components: 1

    - name: Restart Minecraft Container
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: 2222
        script: |
          cd /home/useradmin/docker
          docker compose restart minecraft
