name: CI Build

on:
  push:
  pull_request:
    branches: [ "main", "master" ]

# Avoid a redundant second run when a pushed branch also has an open PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Create placeholder .env
      run: echo "AES_KEY=ci-placeholder-key-not-used-at-build-time" > .env

    - name: Build with Maven
      run: mvn -B clean package --file pom.xml

    - name: Upload built JAR
      uses: actions/upload-artifact@v4
      with:
        name: ServerUtils-jar
        path: target/ServerUtils-*.jar
        retention-days: 7
